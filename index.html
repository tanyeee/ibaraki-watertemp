<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f9ead6">
<title>茨城県 海・湖・河川水温比較</title>
<link rel="icon" href="icons/favicon-48.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="app-header-inner">
    <div class="app-header-title-row">
      <h1>茨城県 海・湖・河川水温比較</h1>
      <div class="header-actions">
        <a href="input.html" class="header-icon-button water-drop-button" aria-label="水温を記録する" title="水温を記録する">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 2.5S5.5 10 5.5 15a6.5 6.5 0 0 0 13 0C18.5 10 12 2.5 12 2.5Z"/>
          </svg>
        </a>
        <button type="button" id="theme-toggle-button" class="header-icon-button theme-toggle-button" aria-label="ダーク表示に切り替え" title="ダーク表示に切り替え">🌙</button>
        <button type="button" id="reload-button" class="header-icon-button reload-button" aria-label="最新データに更新" title="最新データに更新">↻</button>
      </div>
    </div>
    <div id="latest-cards" class="latest-cards" aria-live="polite">
      <p class="loading-text">データ読み込み中...</p>
    </div>
    <div class="latest-cards-actions">
      <button type="button" id="latest-cards-toggle" class="latest-cards-toggle" aria-expanded="false" hidden>すべて表示 ▾</button>
      <button type="button" id="latest-cards-customize" class="latest-cards-customize" disabled>
        <svg class="latest-cards-customize-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 7h10m4 0h2M14 4v6M4 17h2m4 0h10M6 14v6"/>
        </svg>
        <span>表示を編集</span>
      </button>
    </div>
  </div>
</header>

<dialog id="latest-cards-dialog" class="card-customizer" aria-labelledby="card-customizer-title" aria-describedby="card-customizer-help">
  <form id="latest-cards-form" method="dialog">
    <div class="card-customizer-header">
      <h2 id="card-customizer-title">閉じた時のカード表示</h2>
      <button type="button" id="card-customizer-close" class="card-customizer-close" aria-label="設定を閉じる">×</button>
    </div>
    <p id="card-customizer-help" class="card-customizer-help">行数を選び、各位置に表示する地点を指定してください。空欄も選べます。</p>
    <fieldset class="card-row-picker">
      <legend>表示する行数</legend>
      <div class="card-row-options">
        <label><input type="radio" name="card-rows" value="1"><span>1行</span></label>
        <label><input type="radio" name="card-rows" value="2"><span>2行</span></label>
        <label><input type="radio" name="card-rows" value="3"><span>3行</span></label>
      </div>
    </fieldset>
    <div id="card-customizer-slots" class="card-customizer-slots"></div>
    <div class="card-customizer-footer">
      <button type="button" id="card-customizer-reset" class="card-customizer-secondary">初期設定に戻す</button>
      <span class="card-customizer-footer-spacer"></span>
      <button type="button" id="card-customizer-cancel" class="card-customizer-secondary">キャンセル</button>
      <button type="submit" class="card-customizer-save">保存</button>
    </div>
  </form>
</dialog>

<main>
  <nav class="tabs" role="tablist">
    <button class="tab-btn active" id="tab-timeseries" role="tab" aria-selected="true" aria-controls="panel-timeseries" data-mode="timeseries">場所比較モード</button>
    <button class="tab-btn" id="tab-yearly" role="tab" aria-selected="false" aria-controls="panel-yearly" data-mode="yearly">年比較モード</button>
  </nav>

  <section id="panel-timeseries" class="panel" role="tabpanel" aria-labelledby="tab-timeseries">
    <div class="ts-toggle-row">
      <div class="ts-display-toggle" id="ts-display-toggle" role="group" aria-label="表示形式">
        <button type="button" class="ts-display-btn active" data-display-mode="jan-start" aria-pressed="true">1月始まり</button>
        <button type="button" class="ts-display-btn" data-display-mode="rolling" aria-pressed="false">直近表示</button>
      </div>
      <div class="ts-display-toggle" id="ts-plot-style-toggle" role="group" aria-label="描画スタイル">
        <button type="button" class="ts-display-btn active" data-plot-style="standard" aria-pressed="true">標準</button>
        <button type="button" class="ts-display-btn" data-plot-style="dots" aria-pressed="false">ドットのみ</button>
      </div>
    </div>
    <div class="chart-wrap chart-wrap-timeseries">
      <div class="ts-chart-toolbar" id="ts-chart-toolbar">
        <span class="ts-zoom-hint" id="ts-zoom-hint" hidden></span>
        <button type="button" id="ts-zoom-reset" class="zoom-reset-button" disabled hidden>リセット</button>
      </div>
      <div class="chart-canvas-area chart-canvas-area-timeseries">
        <canvas id="chart-timeseries"></canvas>
      </div>
      <div id="chart-timeseries-legend" class="chart-html-legend" aria-label="表示地点の凡例"></div>
    </div>
    <div class="controls timeseries-controls">
      <details class="series-picker">
        <summary>表示する地点を選ぶ</summary>
        <div class="series-picker-content">
          <details class="preset-picker">
            <summary>プリセット</summary>
            <div class="series-presets" aria-label="系列プリセット">
              <div class="preset-buttons" id="series-presets">
                <button type="button" data-preset="representative">代表地点</button>
                <button type="button" data-preset="tonegawa">利根川</button>
                <button type="button" data-preset="lakes">湖沼</button>
                <button type="button" data-preset="none">全て解除</button>
              </div>
            </div>
          </details>
          <label class="dormant-series-toggle">
            <input type="checkbox" id="show-dormant-series">
            <span>休止中の地点も表示</span>
          </label>
          <div class="series-groups" id="series-checkboxes">
            <!-- groupごとの系列チェックボックスはJSで生成 -->
          </div>
        </div>
      </details>
      <div class="control-group range-buttons" id="range-buttons">
        <span class="control-label">表示期間:</span>
        <button data-range="1m">1ヶ月</button>
        <button data-range="3m">3ヶ月</button>
        <button data-range="6m">半年</button>
        <button data-range="9m">9ヶ月</button>
        <button data-range="1y" class="active">1年</button>
      </div>
      <div class="control-group range-buttons is-hidden" id="calendar-start-buttons" role="group" aria-label="固定表示の開始月">
        <span class="control-label">開始月:</span>
        <button type="button" data-start-month="0" class="active" aria-pressed="true">1月始まり</button>
        <button type="button" data-start-month="3" aria-pressed="false">4月始まり</button>
      </div>
    </div>
  </section>

  <section id="panel-yearly" class="panel hidden" role="tabpanel" aria-labelledby="tab-yearly">
    <div class="chart-wrap chart-wrap-yearly">
      <div class="chart-canvas-area chart-canvas-area-yearly">
        <canvas id="chart-yearly"></canvas>
      </div>
    </div>
    <div class="controls yearly-controls">
      <div class="control-group">
        <label for="yearly-series-select">系列を選択:</label>
        <select id="yearly-series-select"></select>
      </div>
      <div class="control-group yearly-add-control">
        <label for="yearly-year-select">年を追加:</label>
        <select id="yearly-year-select" aria-describedby="yearly-year-help"></select>
        <button type="button" id="yearly-add-button">追加</button>
      </div>
      <p id="yearly-year-help" class="control-help">初期表示は直近3年。過去の年を必要な分だけ追加できます。</p>
      <div id="yearly-selected-years" class="year-chips" aria-label="表示中の年" aria-live="polite"></div>
      <label class="yearly-background-toggle">
        <input type="checkbox" id="yearly-show-all">
        <span>全年をうっすら表示</span>
      </label>
      <label class="yearly-background-toggle" id="yearly-normal-band-label">
        <input type="checkbox" id="yearly-normal-band">
        <span>平年値バンドを表示</span>
      </label>
      <span id="yearly-normal-band-note" class="control-help yearly-normal-band-note"></span>
    </div>
  </section>

  <p id="global-status" class="status-text"></p>
</main>

<footer class="app-footer">
  <p>
    データ出典: 海面水温: 気象庁 沿岸域の海面水温情報 / 河川・湖沼: 国土交通省 水文水質データベース / 水道水温: 個人測定
  </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0"></script>
<script src="app.js"></script>
</body>
</html>
