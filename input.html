<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f9ead6">
<title>水温を記録する | 茨城県 海・湖・河川水温比較</title>
<link rel="icon" href="icons/favicon-48.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root {
    color-scheme: light;
    --color-bg: #f5f7f9;
    --color-surface: #ffffff;
    --color-control: #f5f7f9;
    --color-text: #222222;
    --color-muted: #666666;
    --color-border: #dde2e6;
    --color-accent: #0072B2;
    --color-accent-contrast: #ffffff;
    --color-error: #c62828;
    --color-focus-ring: rgba(0, 114, 178, 0.25);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --color-bg: #11161b;
      --color-surface: #1b2229;
      --color-control: #252e37;
      --color-text: #edf1f5;
      --color-muted: #aab4be;
      --color-border: #3a4651;
      --color-accent: #56B4E9;
      --color-accent-contrast: #07141c;
      --color-error: #ff8a80;
      --color-focus-ring: rgba(86, 180, 233, 0.35);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.5;
  }
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
  }
  h1 {
    font-size: 1.2rem;
    margin: 8px 0 4px;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 8px;
    font-size: 0.85rem;
    color: var(--color-accent);
    text-decoration: none;
  }
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label {
    font-size: 0.9rem;
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
  }
  input[type="date"],
  input[type="number"],
  input[type="password"],
  textarea {
    width: 100%;
    font-size: 1.1rem;
    padding: 10px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-control);
    color: var(--color-text);
  }
  input::placeholder,
  textarea::placeholder {
    color: var(--color-muted);
    opacity: 1;
  }
  input:focus-visible,
  textarea:focus-visible,
  button:focus-visible,
  .back-link:focus-visible {
    outline: 3px solid var(--color-focus-ring);
    outline-offset: 2px;
  }
  textarea {
    font-size: 0.95rem;
    resize: vertical;
    min-height: 3.2em;
  }
  .unit-hint {
    font-size: 0.8rem;
    color: var(--color-muted);
    font-weight: normal;
    margin-left: 4px;
  }
  button[type="submit"] {
    appearance: none;
    border: none;
    background: var(--color-accent);
    color: var(--color-accent-contrast);
    font-size: 1.05rem;
    font-weight: 600;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  button[type="submit"]:active {
    opacity: 0.85;
  }
  .help {
    font-size: 0.82rem;
    color: var(--color-muted);
  }
  .help ol {
    margin: 4px 0 0;
    padding-left: 1.2em;
  }
  .status-text {
    font-size: 0.85rem;
    color: var(--color-muted);
    min-height: 1.2em;
    margin-top: -4px;
  }
  .gate[hidden],
  .app-content[hidden] {
    display: none;
  }
  .gate-description {
    margin: 0 0 14px;
    font-size: 0.9rem;
    color: var(--color-muted);
  }
  .gate-error {
    margin: 0;
    min-height: 1.5em;
    font-size: 0.85rem;
    color: var(--color-error);
  }
</style>
</head>
<body>
<main>
  <section id="passcode-gate" class="gate" aria-labelledby="gate-title">
    <h1 id="gate-title">パスコードを入力</h1>
    <div class="card">
      <p class="gate-description">水温記録フォームを開くには、4桁のパスコードを入力してください。</p>
      <form id="passcode-form">
        <div>
          <label for="passcode-input">パスコード</label>
          <input type="password" id="passcode-input" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="one-time-code" required autofocus>
        </div>
        <p id="passcode-error" class="gate-error" role="alert" aria-live="polite"></p>
        <button type="submit">開く</button>
      </form>
    </div>
  </section>

  <div id="app-content" class="app-content" hidden>
    <a class="back-link" href="index.html">&larr; グラフを見る</a>
    <h1>水温を記録する</h1>

    <div class="card">
      <form id="temp-form">
        <div>
          <label for="date-input">日付</label>
          <input type="date" id="date-input" name="date" required>
        </div>
        <div>
          <label for="value-input">水温<span class="unit-hint">(°C)</span></label>
          <input type="number" id="value-input" name="value" step="0.1" inputmode="decimal" required>
        </div>
        <div>
          <label for="note-input">備考<span class="unit-hint">(任意)</span></label>
          <textarea id="note-input" name="note" placeholder="例: 前日に大雨、濁りあり など"></textarea>
        </div>
        <p id="status-text" class="status-text"></p>
        <button type="submit">GitHubで記録する</button>
      </form>
    </div>

    <div class="card help">
      <strong>使い方</strong>
      <ol>
        <li>日付と水温を入力して「GitHubで記録する」をタップします。</li>
        <li>GitHubのIssue作成画面が新しいタブで開くので、内容を確認してそのまま「Submit new issue」をタップします。</li>
        <li>数分後、自動的にデータが追記されグラフに反映されます(Issueはコメントの上で自動クローズされます)。</li>
      </ol>
      GitHubへのログインが必要です(リポジトリオーナーのみ記録可能)。
    </div>
  </div>
</main>

<script>
(function () {
  var GATE_STORAGE_KEY = "tapwater_gate_ok";
  var PASSCODE_HASH = "c91bcd9ef3968cb25256c8fda7b1613b6a3cdddb7513ca818193e4daac5f00e1";

  var gate = document.getElementById("passcode-gate");
  var appContent = document.getElementById("app-content");
  var passcodeForm = document.getElementById("passcode-form");
  var passcodeInput = document.getElementById("passcode-input");
  var passcodeError = document.getElementById("passcode-error");

  function showApp() {
    gate.hidden = true;
    appContent.hidden = false;
  }

  try {
    if (window.localStorage.getItem(GATE_STORAGE_KEY) === "1") {
      showApp();
    }
  } catch (e) {
    // localStorageが使えない環境では毎回パスコードを確認する
  }

  passcodeForm.addEventListener("submit", async function (ev) {
    ev.preventDefault();
    passcodeError.textContent = "";

    var data = new TextEncoder().encode(passcodeInput.value);
    var digest = await window.crypto.subtle.digest("SHA-256", data);
    var hash = Array.from(new Uint8Array(digest), function (byte) {
      return byte.toString(16).padStart(2, "0");
    }).join("");

    if (hash === PASSCODE_HASH) {
      try {
        window.localStorage.setItem(GATE_STORAGE_KEY, "1");
      } catch (e) {
        // localStorageが使えなくても現在のページではフォームを表示する
      }
      showApp();
      return;
    }

    passcodeError.textContent = "パスコードが違います";
    passcodeInput.value = "";
    passcodeInput.focus();
  });
})();
</script>

<script>
(function () {
  var REPO_URL = "https://github.com/tanyeee/ibaraki-watertemp";
  var STORAGE_KEY = "tapwater_last_value";

  var form = document.getElementById("temp-form");
  var dateInput = document.getElementById("date-input");
  var valueInput = document.getElementById("value-input");
  var noteInput = document.getElementById("note-input");
  var statusText = document.getElementById("status-text");

  function todayJst() {
    // JST(UTC+9)基準の「今日」をYYYY-MM-DD形式で返す
    var now = new Date();
    var jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
    var y = jst.getUTCFullYear();
    var m = String(jst.getUTCMonth() + 1).padStart(2, "0");
    var d = String(jst.getUTCDate()).padStart(2, "0");
    return y + "-" + m + "-" + d;
  }

  dateInput.value = todayJst();

  var lastValue = null;
  try {
    lastValue = window.localStorage.getItem(STORAGE_KEY);
  } catch (e) {
    lastValue = null;
  }
  if (lastValue) {
    valueInput.placeholder = "前回: " + lastValue + "°C";
  }

  form.addEventListener("submit", function (ev) {
    ev.preventDefault();
    statusText.textContent = "";

    var dateStr = dateInput.value;
    var valueStr = valueInput.value;
    var note = noteInput.value.trim();

    if (!dateStr) {
      statusText.textContent = "日付を入力してください。";
      return;
    }
    if (valueStr === "" || isNaN(Number(valueStr))) {
      statusText.textContent = "水温を数値で入力してください。";
      return;
    }

    var value = Number(valueStr);
    var title = "temp: " + dateStr + " " + value;
    var body = note ? ("note: " + note) : "";

    try {
      window.localStorage.setItem(STORAGE_KEY, String(value));
    } catch (e) {
      // localStorageが使えない環境では無視
    }

    var issueUrl =
      REPO_URL +
      "/issues/new?title=" +
      encodeURIComponent(title) +
      "&body=" +
      encodeURIComponent(body);

    window.open(issueUrl, "_blank", "noopener");
    statusText.textContent = "GitHubのIssue作成画面を開きました。内容を確認して送信してください。";
  });
})();
</script>
</body>
</html>
