name: update_data

on:
  workflow_dispatch:
    inputs:
      backfill_windows:
        description: "1回に取得する7日窓の数"
        required: false
        default: "4"
        type: string
      backfill_floor:
        description: "遡及下限 (YYYYMMDD)"
        required: false
        default: "20160101"
        type: string
      backfill_until_floor:
        description: "空期間を再確認しながら下限まで繰り返す"
        required: false
        default: false
        type: boolean
  schedule:
    # 毎日 21:10 UTC (= JST 6:10)
    - cron: "10 21 * * *"

permissions:
  contents: write

concurrency:
  group: watertemp-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update sea surface temperature (area137 and area138)
        id: update_sea
        run: |
          failures=0
          for area in 137 138; do
            echo "=== updating sea area $area ==="
            if ! python scripts/update_sea.py --area "$area"; then
              echo "::error::failed to update sea area $area"
              failures=$((failures + 1))
            fi
          done
          echo "failures=$failures" >> "$GITHUB_OUTPUT"

      - name: Update river/lake water temperature (enabled stations)
        id: update_river
        run: |
          failures=0
          station_ids=$(jq -r '.series[] | select(.kind=="river" and .enabled==true) | .station_id' config/stations.json)
          if [ -z "$station_ids" ]; then
            echo "no enabled river stations"
          fi
          for station_id in $station_ids; do
            echo "=== updating station $station_id ==="
            if ! python scripts/update_wqua.py --station "$station_id" --days 14; then
              echo "::error::failed to update river station $station_id"
              failures=$((failures + 1))
            fi
          done
          echo "failures=$failures" >> "$GITHUB_OUTPUT"

      - name: Backfill river/lake water temperature (enabled stations)
        id: backfill_river
        env:
          BACKFILL_WINDOWS: ${{ inputs.backfill_windows || '4' }}
          BACKFILL_FLOOR: ${{ inputs.backfill_floor || '20160101' }}
          BACKFILL_UNTIL_FLOOR: ${{ inputs.backfill_until_floor || 'false' }}
        run: |
          failures=0
          if ! [[ "$BACKFILL_WINDOWS" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::backfill_windows must be a positive integer"
            exit 1
          fi
          if ! [[ "$BACKFILL_FLOOR" =~ ^[0-9]{8}$ ]]; then
            echo "::error::backfill_floor must be YYYYMMDD"
            exit 1
          fi
          floor_iso="${BACKFILL_FLOOR:0:4}-${BACKFILL_FLOOR:4:2}-${BACKFILL_FLOOR:6:2}"
          station_ids=$(jq -r '.series[] | select(.kind=="river" and .enabled==true) | .station_id' config/stations.json)
          if [ -z "$station_ids" ]; then
            echo "no enabled river stations"
          fi
          for station_id in $station_ids; do
            echo "=== backfilling station $station_id ==="
            no_progress=0
            while true; do
              before=$(jq -r '.meta.backfill_cursor // empty' "data/river/${station_id}.json")
              if ! python scripts/backfill_wqua.py \
                --station "$station_id" \
                --windows "$BACKFILL_WINDOWS" \
                --floor "$BACKFILL_FLOOR"; then
                echo "::error::failed to backfill river station $station_id"
                failures=$((failures + 1))
                break
              fi
              if [ "$BACKFILL_UNTIL_FLOOR" != "true" ]; then
                break
              fi
              after=$(jq -r '.meta.backfill_cursor // empty' "data/river/${station_id}.json")
              if [[ -n "$after" && ( "$after" < "$floor_iso" || "$after" == "$floor_iso" ) ]]; then
                echo "backfill target reached: station=$station_id cursor=$after floor=$floor_iso"
                break
              fi
              if [ "$after" = "$before" ]; then
                no_progress=$((no_progress + 1))
                if [ "$no_progress" -ge 3 ]; then
                  echo "::error::backfill cursor did not advance: station=$station_id cursor=$after"
                  failures=$((failures + 1))
                  break
                fi
              else
                no_progress=0
              fi
              sleep 2
            done
          done
          echo "failures=$failures" >> "$GITHUB_OUTPUT"

      - name: Validate generated data
        run: python scripts/validate_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sea data/river
          if ! git diff --cached --quiet; then
            git commit -m "Auto update water temperature data"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push
          fi

      - name: Fail workflow if any source failed
        if: always()
        env:
          SEA_FAILURES: ${{ steps.update_sea.outputs.failures }}
          RIVER_FAILURES: ${{ steps.update_river.outputs.failures }}
          BACKFILL_FAILURES: ${{ steps.backfill_river.outputs.failures }}
        run: |
          sea_failures=${SEA_FAILURES:-0}
          river_failures=${RIVER_FAILURES:-0}
          backfill_failures=${BACKFILL_FAILURES:-0}
          if [ "$sea_failures" -ne 0 ] || [ "$river_failures" -ne 0 ] || [ "$backfill_failures" -ne 0 ]; then
            echo "::error::data update completed with failures: sea=$sea_failures river=$river_failures backfill=$backfill_failures"
            exit 1
          fi
